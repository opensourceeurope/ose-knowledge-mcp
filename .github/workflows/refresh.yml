name: Weekly knowledge refresh

on:
  schedule:
    - cron: "0 3 * * 6"   # Saturdays 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.8.19"

      # opencrane is version-locked in .opencrane/opencrane-version (never floats to the
      # latest PyPI release); every uvx call below pins to it.
      - name: Resolve the pinned opencrane version
        run: echo "OPENCRANE_VERSION=$(tr -d '[:space:]' < .opencrane/opencrane-version)" >> "$GITHUB_ENV"

      - name: Re-fetch sources and regenerate committed inputs
        env:
          GITHUB_TOKEN: ${{ github.token }}   # opencrane fetch needs a non-empty token
        run: |
          uvx "opencrane@${OPENCRANE_VERSION}" fetch
          uvx "opencrane@${OPENCRANE_VERSION}" llms
          uvx "opencrane@${OPENCRANE_VERSION}" chunk

      - name: Refresh llms.txt page indexes (per-page citation links in chat)
        # opencrane only fetches llms-full.txt; the per-page index that
        # function/scripts/bundle-pagemap.mjs needs is fetched here.
        # Add a line when adding a source to .opencrane/config.yaml.
        run: |
          curl -sf https://docs.opencollective.com/open-source-europe/llms.txt \
            -o .opencrane/llmstxt/open-source-europe/llms.txt
          curl -sf https://docs.opencollective.com/oc-europe-internal-doc/llms.txt \
            -o .opencrane/llmstxt/oc-europe-internal-doc/llms.txt

      # If the re-chunk changed chunks.json, rebuild embeddings.json + milvus.db so the
      # committed index tracks the refreshed content; a no-op (reuses the committed
      # artifacts) when the sources didn't change. This is where the weekly re-embed
      # happens — the release path just packs the result.
      - name: Rebuild the vector index if chunks changed
        # ensure-index.sh reads the same pinned version from .opencrane/opencrane-version.
        run: ./scripts/ensure-index.sh

      - name: Commit refreshed inputs if changed
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}   # step-scoped; not persisted in .git/config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Committed INPUTS (llmstxt snapshots + chunks.json) AND the committed vector
          # index (embeddings.json + milvus.db), so the index ships with its chunks.
          git add .opencrane/llmstxt .opencrane/chunks.json .opencrane/embeddings.json .opencrane/milvus.db
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No source changes this week."
          else
            # `fix:` (not `chore:`) so release-please rolls this into the release PR — see below.
            git commit -m "fix(knowledge): refresh OSE knowledge sources ($(date -u +%Y-%m-%d))"
            # checkout ran with persist-credentials:false, so push with a step-scoped token.
            # GH_TOKEN / GITHUB_REPOSITORY are plain shell env vars here.
            remote="https://x-access-token:$GH_TOKEN@github.com/$GITHUB_REPOSITORY.git"
            git push "$remote" HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

# Shipping: the refresh commit is a `fix:`, so release-please rolls it into the rolling
# release PR (a patch bump). Merging that release PR cuts vX.Y.Z and, in the same run,
# release.yml publishes ose-knowledge-mcp to PyPI and deploys the MCP container +
# chat function + chat page with the refreshed knowledge baked in. Shipping is now fully
# hands-off: release.yml arms GitHub auto-merge on the release PR, so once its CI is green
# the PR merges itself and the publish + deploy chain runs — no manual merge needed.
