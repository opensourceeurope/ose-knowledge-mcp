name: Release

# Conventional commits on main drive releases end-to-end in ONE workflow.
# release-please maintains a rolling "release PR" that bumps the version,
# regenerates CHANGELOG.md + plugin.json's version, and syncs the mcp pin.
# Merging that PR makes release-please tag vX.Y.Z + cut a GitHub Release; in the
# SAME run its `releases_created` output gates the publish + deploy jobs below
# (build + PyPI publish + container/function/chat deploy). There is no separate
# `release: published` handoff anymore — everything happens in this run.
#
# RELEASE_TOKEN (repo secret — fine-grained PAT or GitHub App token with
# "Contents: read/write" + "Pull requests: read/write" on this repo): used for the
# release-please checkout so (a) the mcp-sync step can push back onto the release-PR
# branch and (b) the release PR gets CI runs (commits made by the default
# GITHUB_TOKEN do not trigger other workflows). ONE-TIME MAINTAINER SETUP: create
# this secret or the release PR won't get CI and the sync push will fail.
#
# PyPI trusted publisher (one-time, pypi.org): project "ose-knowledge-mcp" → repo
# opensourceeurope/ose-knowledge-mcp, workflow release.yml (no GitHub
# environment). NOTE: the OIDC workflow_ref must match THIS file's name
# (release.yml). If you rename this file, update the PyPI trusted publisher.
#
# Deploy needs (added by the maintainer):
#   secrets: SCW_ACCESS_KEY, SCW_SECRET_KEY, SCW_DEFAULT_PROJECT_ID, SCW_DEFAULT_ORGANIZATION_ID
#   variables: SCW_REGION, SCW_REGISTRY_NAMESPACE, SCW_CONTAINER_ID

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Already-published version to (re)deploy to Scaleway, e.g. 0.0.4"
        required: true

# Least-privilege default for the whole workflow. The only job that needs write
# (release-please) grants itself contents/pull-requests write at the job level;
# every other job — and the reusable deploy-* workflows — only reads.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # fetch-depth 0 makes any release-PR branch fetchable. persist-credentials:
      # false keeps the token out of .git/config; the sync step below injects
      # RELEASE_TOKEN into the origin URL only for its own fetch/push.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Sync the mcp package pin (.mcp.json + chat/index.html) onto the open release PR.
      # release-please can't cleanly rewrite `ose-knowledge-mcp==X.Y.Z` itself (see
      # scripts/sync-mcp-version.sh). Runs whenever a release PR exists; idempotent, so
      # re-running as the PR is recreated is safe. The checkout above ran with
      # persist-credentials: false, so this step injects RELEASE_TOKEN into the origin
      # URL to authenticate its own fetch + push back onto the release-PR branch.
      - name: Sync mcp version onto the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          BRANCH="$(printf '%s' "$PR_JSON" | python3 -c 'import json,sys; print(json.load(sys.stdin)["headBranchName"])')"
          echo "Release PR branch: $BRANCH"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          # The manifest on the PR branch already carries the bumped version.
          ./scripts/sync-mcp-version.sh
          if git diff --quiet; then
            echo "No pin changes to commit."
          else
            git add plugins/ose-knowledge/.mcp.json chat/index.html
            git commit -m "chore: sync ose-knowledge-mcp pin to release version"
            git push origin "HEAD:$BRANCH"
          fi

  # Fires only in the same run that release-please actually cut a release (the run
  # where the release PR was merged). Builds the package with the baked Milvus index
  # and publishes to PyPI via trusted publishing (OIDC, no token).
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.released == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.8.19"
          enable-cache: false

      - name: Rebuild the vector index from the committed chunks
        # chunks.json + config.yaml are committed inputs; embeddings + milvus.db are
        # derived here and baked into the package by `opencrane pack`. The embed step
        # downloads the model from HuggingFace, which can hit anonymous 429s on shared
        # runners — retry a few times. (Set an HF_TOKEN to remove this flakiness entirely.)
        run: |
          for i in 1 2 3 4 5; do
            uvx opencrane embed && break
            echo "embed failed (HuggingFace rate-limit?), retry $i/5 after 25s..."; sleep 25
          done
          uvx opencrane index

      # The version comes from the release tag release-please just created, "v" stripped.
      - name: Pack the MCP package
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "Packing ose-knowledge-mcp version $VERSION"
          uvx opencrane pack --name ose-knowledge-mcp --version "$VERSION" --output .opencrane/pack

      - name: Build wheel + sdist
        # `uv build` (not `uv pip install --system build` — the runner's system Python is
        # externally managed, PEP 668, and refuses system-wide installs).
        run: uv build .opencrane/pack --out-dir .opencrane/pack/dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: .opencrane/pack/dist

  deploy:
    needs: [release-please, publish]
    # After a successful publish (release run), or standalone via manual dispatch.
    if: ${{ !cancelled() && (needs.publish.result == 'success' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
      SCW_DEFAULT_REGION: ${{ vars.SCW_REGION }}
      REGISTRY: rg.${{ vars.SCW_REGION }}.scw.cloud/${{ vars.SCW_REGISTRY_NAMESPACE }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve version to deploy
        id: ver
        env:
          EVENT: ${{ github.event_name }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then V="$INPUT_VERSION"; else V="${TAG_NAME#v}"; fi
          echo "$V" | grep -qE '^[0-9A-Za-z.+_-]+$' || { echo "::error::invalid version '$V'"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Deploying ose-knowledge-mcp==$V"

      - name: Install Scaleway CLI
        # GitHub's release CDN intermittently 504s on this download — retry a few times
        # so a transient gateway error doesn't fail the whole deploy.
        run: |
          for i in 1 2 3 4 5; do
            curl -fsSL --retry 3 --retry-all-errors --retry-delay 5 \
              https://github.com/scaleway/scaleway-cli/releases/download/v2.56.1/scaleway-cli_2.56.1_linux_amd64 \
              -o /usr/local/bin/scw && break
            echo "scw download failed (CDN 5xx?), retry $i/5 after 15s..."; sleep 15
          done
          chmod +x /usr/local/bin/scw
          scw version

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: rg.${{ vars.SCW_REGION }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push image (installs the published package — no index rebuild)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: .opencrane/Dockerfile
          push: true
          build-args: |
            PKG_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/ose-mcp:latest
            ${{ env.REGISTRY }}/ose-mcp:${{ steps.ver.outputs.version }}

      - name: Deploy new image to the serverless container
        env:
          CONTAINER_ID: ${{ vars.SCW_CONTAINER_ID }}
          IMAGE: ${{ env.REGISTRY }}/ose-mcp:${{ steps.ver.outputs.version }}
        run: |
          # `update image=… --wait` sets the new image, redeploys, and waits for ready.
          scw container container update "$CONTAINER_ID" image="$IMAGE" --wait

  # The chat function is independent of the PyPI package, but it bundles the persona +
  # pagemap (derived from the chunks), so redeploy it on every release to pick up refreshed
  # citation links. Runs on a release run or a manual dispatch, independent of publish.
  deploy-function:
    needs: [release-please]
    if: ${{ !cancelled() && (needs.release-please.outputs.released == 'true' || github.event_name == 'workflow_dispatch') }}
    uses: ./.github/workflows/deploy-function.yml
    secrets:
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

  # Upload the static chat page after the function is deployed (renders config.js from
  # the CHAT_FUNCTION_URL variable). Completes the chat end-to-end on every release.
  deploy-chat:
    needs: deploy-function
    if: ${{ !cancelled() && needs.deploy-function.result == 'success' }}
    uses: ./.github/workflows/deploy-chat.yml
    secrets:
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
